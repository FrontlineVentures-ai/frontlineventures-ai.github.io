<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontline Ventures Ltd</title>
  <meta name="description" content="Business operating intelligence and market entry services for UK and North American markets.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #2B4A39;
      --green-mid:   #3D6B52;
      --green-light: #5A8A6E;
      --cream:       #ECE8DF;
      --cream-dark:  #DDD8CE;
      --cream-deep:  #CEC9BF;
      --text:        #1C3027;
      --text-muted:  #5C7A6A;
      --border:      rgba(43,74,57,0.14);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 62px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
    }
    .nav-logo { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .nav-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 11.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1.35;
      color: var(--green);
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 12.5px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      font-weight: 400;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }
    .container { max-width: 900px; margin: 0 auto; padding: 0 2.5rem; }
    section { padding: 5.5rem 0; }
    .section-label {
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2.25rem;
    }
    .divider { border: none; border-top: 1px solid var(--border); }
    #hero { padding-top: 9.5rem; padding-bottom: 6rem; }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 4rem;
      align-items: end;
    }
    .hero-headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5.5vw, 5rem);
      font-weight: 500;
      line-height: 1.04;
      color: var(--green);
      letter-spacing: -0.01em;
      margin-bottom: 2rem;
    }
    .hero-sub {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 400px;
    }
    .hero-aside { padding-bottom: 0.25rem; }
    .hero-stat { border-top: 1px solid var(--border); padding: 1.1rem 0; }
    .hero-stat:last-child { border-bottom: 1px solid var(--border); }
    .hero-stat-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }
    .hero-stat-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--green);
      font-weight: 500;
    }
    #capabilities { background: var(--green); margin: 0; padding: 5.5rem 0; }
    #capabilities .section-label { color: rgba(236,232,223,0.45); }
    #capabilities h2 { color: var(--cream); }
    #capabilities p  { color: rgba(236,232,223,0.75); }
    #capabilities h3 { color: var(--cream); }
    .cap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      margin-top: 3rem;
      background: rgba(255,255,255,0.1);
    }
    .cap-block { background: var(--green); padding: 2.25rem 2rem; }
    .cap-num {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(236,232,223,0.4);
      margin-bottom: 1.1rem;
      font-weight: 400;
    }
    .cap-block h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }
    .cap-block p { font-size: 0.92rem; line-height: 1.65; font-weight: 300; }
    .process-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 2.5rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
    }
    .process-row:last-child { border-bottom: 1px solid var(--border); }
    .process-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      color: var(--cream-deep);
      font-weight: 400;
      line-height: 1;
      padding-top: 4px;
    }
    .process-row h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      color: var(--green);
      font-weight: 500;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }
    .process-row p { font-size: 0.92rem; font-weight: 300; color: var(--text-muted); }
    .proof-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-top: 3rem;
    }
    .proof-block { background: var(--cream); padding: 1.75rem 2rem; }
